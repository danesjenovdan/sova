name: Automatic PRs
on:
  push:
    branches:
      - "palestina"
jobs:
  pull_requests:
    name: Automatic PRs
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Pull request to palestina-k8s
        uses: repo-sync/pull-request@v2
        with:
          destination_branch: "palestina-k8s"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_title: "Pulling ${{ github.ref }} into palestina-k8s"
